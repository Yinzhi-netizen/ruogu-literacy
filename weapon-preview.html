<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>金箍棒样式预览</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell library-shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">单件兵器样式确认</p>
          <h1>金箍棒</h1>
        </div>
      </section>

      <section class="weapon-preview-card">
        <div class="weapon-preview-art">
          <img src="./assets/weapons-held/01_jingubang_r.png" alt="金箍棒" />
        </div>

        <div class="weapon-preview-info">
          <p class="level-badge">武力值 95</p>
          <h2>金箍棒</h2>
          <p><strong>人物：</strong>孙悟空</p>
          <p><strong>书名：</strong>《西游记》</p>
          <p><strong>简介：</strong>东海龙宫的定海神珍，孙悟空最有名的兵器，可以变大变小。</p>
        </div>

        <div class="weapon-fragment-preview">
          <h3>碎片设计</h3>
          <div class="weapon-piece-row">
            <div class="weapon-piece lit">
              <span class="piece-cap"></span>
              <strong>左金箍</strong>
            </div>
            <div class="weapon-piece">
              <span class="piece-body"></span>
              <strong>如意棒身</strong>
            </div>
            <div class="weapon-piece">
              <span class="piece-cap"></span>
              <strong>右金箍</strong>
            </div>
          </div>
          <p>闯关集齐 10 星时，点亮一个真实部位；三个部位全亮后，金箍棒收入武器库。</p>
        </div>
      </section>
    </main>
  </body>
</html>
