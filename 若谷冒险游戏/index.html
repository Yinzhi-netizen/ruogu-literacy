<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#4a5538" />
  <title>若谷星河书旅 · 小人对战台</title>
  <style>
    .page-background {
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image: url("../assets/backgrounds/06_cloud_characters.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    .page-background::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(244, 242, 237, .55);
    }
    :root {
      --paper: #f7f6f2;
      --paper-2: #eeede6;
      --ink: #22222a;
      --soft: #555966;
      --line: #d8d6ce;
      --blue: #2f6f4e;
      --blue-2: #5e8f68;
      --red: #d4684c;
      --gold: #d6a642;
      --left: #2f6f4e;
      --right: #6f7f3f;
      --shadow: 0 2px 14px rgba(0, 0, 0, .07);
      --deep-shadow: 0 18px 28px rgba(21, 25, 38, .18);
      font-family: "KaiTi", "STKaiti", "华文楷体", "楷体", "Noto Serif CJK SC", serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      color: var(--ink);
      background:
        radial-gradient(ellipse at 50% 18%, rgba(91, 124, 181, .12), transparent 52%),
        linear-gradient(180deg, #f7f6f2, #eeede6 72%, #e8e2d3);
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .045;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.18' numOctaves='5'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }
    button, select { font: inherit; color: inherit; }
    button { border: 0; cursor: pointer; }

    .app {
      width: min(1360px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 16px;
      display: grid;
      gap: 14px;
      position: relative;
      z-index: 1;
    }
    .top {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }
    .eyebrow {
      margin: 0 0 4px;
      color: var(--blue-2);
      font-family: Georgia, serif;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 2.8px;
    }
    h1, h2, h3, p { margin: 0; }
    h1 {
      font-size: clamp(34px, 6vw, 64px);
      line-height: 1;
      letter-spacing: 2px;
    }
    .top-actions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }
    .paper-btn {
      min-height: 42px;
      padding: 9px 14px;
      border: 1px solid rgba(47,111,78,.28);
      border-radius: 6px;
      background: rgba(243,248,241,.86);
      color: var(--blue);
      box-shadow: var(--shadow);
      font-weight: 900;
    }
    .paper-btn.primary,
    .paper-btn.active {
      color: #fff;
      background: var(--blue);
      border-color: transparent;
    }
    .paper-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }

    .paper-btn:disabled {
      opacity: .48;
      cursor: not-allowed;
    }

    .wallet-bar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background:
        radial-gradient(circle at 92% 20%, rgba(214,166,66,.18), transparent 12rem),
        rgba(255,255,255,.66);
      box-shadow: var(--shadow);
    }
    .wallet-main {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      font-weight: 900;
    }
    .wallet-main span {
      min-height: 32px;
      display: inline-grid;
      place-items: center;
      padding: 5px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--soft);
    }
    .wallet-main strong { color: var(--blue); }
    .wallet-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-end;
    }
    .wallet-actions .paper-btn { min-height: 34px; padding: 6px 10px; }
    .wallet-note {
      grid-column: 1 / -1;
      color: var(--soft);
      font-size: 13px;
      font-weight: 900;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(220px, 260px) minmax(430px, 1fr) minmax(220px, 260px);
      gap: 12px;
      align-items: stretch;
    }
    .hand-panel, .stage-shell, .logbook {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255,255,255,.68);
      box-shadow: var(--shadow);
    }
    .hand-panel {
      padding: 10px;
      display: grid;
      gap: 8px;
      align-content: start;
      min-height: 560px;
    }
    .hand-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--line);
    }
    .hand-title h2 { font-size: 22px; }
    .side-badge {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #fff;
      font-weight: 900;
      background: var(--left);
    }
    .right-panel .side-badge { background: var(--right); }
    .picker { display: grid; gap: 7px; }
    .picker label { color: var(--soft); font-weight: 900; font-size: 14px; }
    select {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      padding: 8px 10px;
      font-weight: 900;
    }
    .mini-card {
      min-height: 92px;
      display: grid;
      grid-template-columns: 86px 1fr;
      place-items: center;
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background:
        radial-gradient(circle at 50% 40%, rgba(215,166,66,.16), transparent 34%),
        linear-gradient(180deg, #fdfbf6, #f1eee5);
      overflow: hidden;
    }
    .mini-card img {
      width: 84px;
      height: 78px;
      object-fit: contain;
      filter: drop-shadow(0 14px 12px rgba(0,0,0,.16));
    }
    .mini-card strong { font-size: 18px; justify-self: start; }
    .weapon-line {
      width: 100%;
      display: grid;
      grid-template-columns: 54px 1fr;
      gap: 7px;
      align-items: center;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #f5f4f1;
    }
    .weapon-line img {
      width: 44px;
      height: 44px;
      object-fit: contain;
      border-radius: 4px;
    }
    .weapon-line strong { display: block; }
    .weapon-line small { color: var(--soft); font-weight: 900; font-size: 11px; line-height: 1.2; }
    .moves { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 6px; }
    .move-btn {
      min-height: 52px;
      padding: 6px 5px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 3px;
      align-items: center;
      justify-items: center;
      text-align: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      box-shadow: 0 2px 0 rgba(44,74,124,.16);
      font-weight: 900;
    }
    .move-btn span:first-child {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #fff;
      background: var(--left);
    }
    .right-panel .move-btn span:first-child { background: var(--right); }
    .move-btn small { display: none; }
    .move-btn strong { font-size: 13px; line-height: 1.1; }
    .move-btn:disabled {
      opacity: .52;
      cursor: not-allowed;
      box-shadow: none;
    }
    .move-btn.defense { background: linear-gradient(180deg, #f3f8f1, #fff); }
    .move-btn.control { background: linear-gradient(180deg, #f5fbf1, #fff); }
    .move-btn.spirit { background: linear-gradient(180deg, #f2f4fb, #fff); }
    .move-btn.ultimate {
      color: #2d2310;
      background: linear-gradient(180deg, #fff4cf, #f3d27b);
      border-color: rgba(214,166,66,.55);
    }
    .move-btn.ultimate span:first-child { background: var(--gold); color: #1f1b13; }

    .stage-shell {
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      min-height: 560px;
      overflow: hidden;
    }
    .scoreboard {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      align-items: center;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      background: rgba(247,246,242,.72);
    }
    .hp-box { display: grid; gap: 5px; }
    .hp-box.right { text-align: right; }
    .hp-name { display: flex; justify-content: space-between; gap: 8px; color: var(--soft); font-weight: 900; }
    .hp-box.right .hp-name { flex-direction: row-reverse; }
    .hp-track {
      height: 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #e5e1d5;
      overflow: hidden;
    }
    .hp-fill {
      height: 100%;
      width: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #5c9965, #c7bd50);
      transition: width .35s ease;
    }
    .hp-box.right .hp-fill { margin-left: auto; background: linear-gradient(90deg, #e1a23e, var(--red)); }
    .vs-seal {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #fff;
      background: linear-gradient(180deg, var(--blue), #213d2f);
      box-shadow: var(--deep-shadow);
      font-size: 26px;
      font-weight: 900;
    }
    .scene-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 30px;
      padding: 3px 8px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(90deg, rgba(47,111,78,.12), rgba(247,246,242,.82) 34%, rgba(214,166,66,.10)),
        rgba(247,246,242,.72);
      color: var(--soft);
      font-weight: 900;
    }
    .scene-current {
      min-width: 0;
      display: flex;
      align-items: baseline;
      gap: 6px;
      color: var(--blue);
    }
    .scene-current span {
      color: var(--soft);
      font-size: 11px;
      letter-spacing: 1px;
    }
    .scene-current strong {
      font-size: 15px;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .scene-picker {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 24px;
      padding: 2px 4px 2px 10px;
      border: 1px solid rgba(47,111,78,.22);
      border-radius: 999px;
      background: rgba(255,255,255,.72);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.7);
      color: var(--blue);
      font-size: 12px;
    }
    .scene-select {
      min-width: 104px;
      max-width: 150px;
      height: 22px;
      padding: 2px 8px;
      border: 0;
      border-radius: 999px;
      background: var(--blue);
      font: inherit;
      font-weight: 900;
      text-align: center;
      text-align-last: center;
      color: #fff;
      cursor: pointer;
      outline: none;
    }
    .scene-select option { color: var(--ink); background: #fff; }

    .stage {
      position: relative;
      min-height: 430px;
      overflow: hidden;
      background: linear-gradient(180deg, #dde8df 0%, #eff0e8 42%, #c5b28d 100%);
    }
    .stage-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity .7s ease;
    }
    .stage-bg.show { opacity: 1; }
    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(47,111,78,.1), transparent 18%, transparent 82%, rgba(212,104,76,.1)),
        repeating-linear-gradient(90deg, rgba(255,255,255,.16) 0 1px, transparent 1px 84px);
      pointer-events: none;
    }
    .ground {
      display: none;
      position: absolute;
      left: -4%;
      right: -4%;
      bottom: 0;
      height: 146px;
      background:
        radial-gradient(ellipse at 20% 18%, rgba(44,74,124,.16), transparent 26%),
        radial-gradient(ellipse at 74% 20%, rgba(184,74,48,.14), transparent 28%),
        linear-gradient(180deg, #ad8d5f, #746049);
      border-top: 1px solid rgba(91,70,44,.35);
    }
    .arena-line {
      position: absolute;
      left: 50%;
      top: 118px;
      bottom: 48px;
      border-left: 1px dashed rgba(44,74,124,.25);
    }
    .fighter {
      position: absolute;
      bottom: 96px;
      width: 168px;
      height: 176px;
      display: grid;
      place-items: center;
      transform-origin: 50% 100%;
      transition: left .38s cubic-bezier(.2,.9,.2,1), right .38s cubic-bezier(.2,.9,.2,1), transform .28s ease, filter .28s ease;
      z-index: 4;
    }
    .fighter.left { left: 15%; }
    .fighter.right { right: 15%; }
    .fighter .fighter-sprite {
      width: 164px;
      height: 164px;
      object-fit: contain;
      filter: drop-shadow(0 20px 16px rgba(0,0,0,.2));
    }
    .fighter.right .fighter-sprite { transform: scaleX(-1); }
    .fighter.idle { animation: idle 1.4s ease-in-out infinite; }
    .fighter.charge-left { animation: leftCharge .58s ease; }
    .fighter.charge-right { animation: rightCharge .58s ease; }
    .fighter.smash { animation: smash .68s ease; }
    .fighter.spin { animation: spinHit .72s ease; }
    .fighter.kick { animation: flyKick .7s ease; }
    .fighter.combo { animation: comboHit .82s ease; }
    .fighter.dodge { animation: dodge .52s ease; }
    .fighter.jump { animation: jumpDodge .66s ease; }
    .fighter.crouch { animation: crouchDodge .62s ease; }
    .fighter.guard { filter: drop-shadow(0 0 24px rgba(91,124,181,.52)); }
    .fighter.beam { animation: beamCast .72s ease; }
    .fighter.blink { animation: blinkStrike .68s ease; }
    .fighter.bind-cast { animation: bindCast .72s ease; }
    .fighter.orbit { filter: drop-shadow(0 0 28px rgba(91,124,181,.58)); }
    .fighter.arrow { animation: beamCast .68s ease; }
    .fighter.leopard { animation: leopardRush .78s ease; }
    .fighter.snake { animation: snakeBite .78s ease; }
    .fighter.beetle { animation: beetleCall .78s ease; }
    .fighter.magnet { animation: magnetCast .82s ease; }
    .fighter.gold-pants { animation: goldPantsFly .9s ease; filter: drop-shadow(0 0 24px rgba(214,166,66,.72)); }
    .fighter.flyer { animation: skyDive .92s ease; filter: drop-shadow(0 0 26px rgba(91,124,181,.66)); }
    .fighter.rainbow { filter: drop-shadow(0 0 26px rgba(91,124,181,.74)); }
    .fighter.boss-strike { animation: bossStrike 1.05s ease; filter: drop-shadow(0 0 36px rgba(184,74,48,.82)); }
    .fighter.boss-mode .fighter-sprite { transform: scale(1.28); filter: drop-shadow(0 26px 20px rgba(0,0,0,.26)) drop-shadow(0 0 24px rgba(184,74,48,.5)); }
    .fighter.right.boss-mode .fighter-sprite { transform: scaleX(-1) scale(1.28); }
    .fighter.shielded::after,
    .fighter.evading::after,
    .fighter.boss-mode::after {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: grid;
      place-items: center;
      border-radius: 999px;
      pointer-events: none;
      z-index: -1;
      font-weight: 900;
    }
    .fighter.shielded::after {
      content: "";
      width: 192px;
      height: 192px;
      border: 8px solid rgba(255,255,255,.54);
      background:
        conic-gradient(from 18deg, rgba(216,70,65,.34), rgba(234,174,55,.34), rgba(83,151,92,.34), rgba(69,130,190,.34), rgba(151,91,174,.34), rgba(216,70,65,.34));
      box-shadow: 0 0 28px rgba(91,124,181,.38);
      animation: rainbowPulse 1.1s ease-in-out infinite;
    }
    .fighter.evading::after {
      content: "躲";
      width: 58px;
      height: 58px;
      color: #fff;
      background: rgba(47,111,78,.72);
      box-shadow: 0 0 20px rgba(47,111,78,.35);
    }
    .fighter.boss-mode::after {
      content: "BOSS";
      top: 8px;
      width: 76px;
      height: 30px;
      color: #fff;
      background: rgba(184,74,48,.9);
      box-shadow: 0 0 18px rgba(184,74,48,.42);
      z-index: 5;
    }
    .fighter.ultimate { animation: ultimateHit 1s ease; filter: drop-shadow(0 0 34px rgba(215,166,66,.8)); }
    .fighter.hurt-left { animation: hurtLeft .45s ease; }
    .fighter.hurt-right { animation: hurtRight .45s ease; }
    .fighter.win { animation: victory .9s ease-in-out infinite; filter: drop-shadow(0 0 20px rgba(215,166,66,.5)); }
    .weapon-aura {
      position: absolute;
      width: 88px;
      height: 88px;
      right: -6px;
      top: 24px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(215,166,66,.42), transparent 68%);
      opacity: 0;
      transform: rotate(-20deg);
      pointer-events: none;
    }
    .fighter.right .weapon-aura { right: auto; left: -6px; }
    .fighter.attacking .weapon-aura { animation: auraFlash .55s ease; }
    .weapon-ghost {
      position: absolute;
      width: var(--weapon-size, 140px);
      height: var(--weapon-size, 140px);
      left: var(--weapon-x, 78%);
      top: var(--weapon-y, 48%);
      object-fit: contain;
      opacity: .95;
      transform: translate(-50%, -50%) rotate(var(--weapon-rotate, -18deg));
      transform-origin: var(--weapon-origin-x, 25%) var(--weapon-origin-y, 75%);
      filter: drop-shadow(0 6px 6px rgba(0,0,0,.32));
      pointer-events: none;
      z-index: var(--weapon-z, 3);
    }
    .weapon-halo,
    .weapon-stamp,
    .weapon-cover {
      filter: drop-shadow(0 8px 10px rgba(0,0,0,.22)) drop-shadow(0 0 16px rgba(215,166,66,.36));
    }
    .weapon-halo { animation: weaponFloat 1.8s ease-in-out infinite; }
    .fighter.disarmed .weapon-ghost {
      opacity: 0;
      transform: translate(-50%, -50%) translateY(-48px) scale(.25) rotate(var(--weapon-rotate, -18deg));
    }
    .impact {
      position: absolute;
      left: 50%;
      top: 52%;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      z-index: 8;
      background: radial-gradient(circle, #fff 0 8%, #f4d27c 15% 30%, rgba(212,104,76,.55) 34%, transparent 70%);
      transform: translate(-50%, -50%) scale(.2);
    }
    .impact.show { animation: impact .44s ease; }
    .fx-beam {
      position: absolute;
      z-index: 7;
      opacity: 0;
      pointer-events: none;
      top: 48%;
      width: 36%;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255,255,255,0), rgba(91,124,181,.92), rgba(255,255,255,0));
      filter: drop-shadow(0 0 12px rgba(91,124,181,.8));
    }
    .fx-beam.show { animation: beamShot .56s ease; }
    .fx-ring {
      position: absolute;
      z-index: 7;
      opacity: 0;
      pointer-events: none;
      top: 43%;
      width: 116px;
      height: 50px;
      border-radius: 50%;
      border: 6px solid rgba(214,166,66,.9);
      box-shadow: 0 0 20px rgba(214,166,66,.7);
    }
    .fx-ring.show { animation: ringBind .72s ease; }
    .fx-orbit {
      position: absolute;
      z-index: 7;
      opacity: 0;
      pointer-events: none;
      width: 156px;
      height: 156px;
      border-radius: 50%;
      border: 3px dashed rgba(91,124,181,.78);
      box-shadow: 0 0 22px rgba(91,124,181,.36);
    }
    .fx-orbit.show { animation: orbitSpin .82s linear; }
    .fx-arrow,
    .fx-leopard,
    .fx-snake,
    .fx-beetle,
    .fx-magnet,
    .fx-pants,
    .fx-flyer,
    .fx-rainbow,
    .fx-boss {
      position: absolute;
      z-index: 7;
      opacity: 0;
      pointer-events: none;
      top: 44%;
      font-weight: 900;
      text-shadow: 0 2px 0 rgba(255,255,255,.84);
      filter: drop-shadow(0 10px 10px rgba(0,0,0,.18));
    }
    .fx-arrow { width: 34%; height: 5px; border-radius: 999px; background: linear-gradient(90deg, transparent, #51391f 18%, #d6a642 82%, transparent); }
    .fx-arrow::after { content: ""; position: absolute; right: -8px; top: -7px; border-left: 16px solid #51391f; border-top: 9px solid transparent; border-bottom: 9px solid transparent; }
    .fx-leopard::before { content: "黄金猎豹"; color: #9b6d16; font-size: 28px; }
    .fx-snake::before { content: "毒蛇咬住"; color: #395f2b; font-size: 26px; }
    .fx-beetle::before { content: "金甲虫"; color: #a87811; font-size: 28px; }
    .fx-magnet::before { content: "吸铁石"; color: #284668; font-size: 28px; }
    .fx-pants::before { content: "黄金内裤"; color: #9b6d16; font-size: 26px; }
    .fx-flyer::before { content: "黄金飞行器"; color: var(--blue); font-size: 26px; }
    .fx-rainbow {
      width: 170px;
      height: 170px;
      border-radius: 50%;
      background: conic-gradient(rgba(216,70,65,.38), rgba(234,174,55,.38), rgba(83,151,92,.38), rgba(69,130,190,.38), rgba(151,91,174,.38), rgba(216,70,65,.38));
      border: 7px solid rgba(255,255,255,.58);
    }
    .fx-boss::before { content: "大BOSS"; color: #b84a30; font-size: 34px; letter-spacing: 2px; }
    .fx-arrow.show { animation: arrowShot .62s ease; }
    .fx-leopard.show { animation: helperRush .76s ease; }
    .fx-snake.show { animation: helperRush .84s ease; }
    .fx-beetle.show { animation: helperRush .82s ease; }
    .fx-magnet.show { animation: magnetPull .88s ease; }
    .fx-pants.show { animation: skyHelper .86s ease; }
    .fx-flyer.show { animation: skyHelper .9s ease; }
    .fx-rainbow.show { animation: rainbowPulse .9s ease; }
    .fx-boss.show { animation: bossFlash .96s ease; }
    .fx-from-right.fx-arrow { transform: scaleX(-1); }
    .fx-from-right.fx-arrow.show { animation: arrowShotRight .62s ease; }
    .fx-from-right.fx-leopard.show,
    .fx-from-right.fx-snake.show,
    .fx-from-right.fx-beetle.show { animation: helperRushRight .82s ease; }
    .fx-from-right.fx-magnet.show { animation: magnetPullRight .88s ease; }
    .fx-from-right.fx-pants.show,
    .fx-from-right.fx-flyer.show { animation: skyHelperRight .9s ease; }
    .damage {
      position: absolute;
      z-index: 9;
      color: var(--red);
      font-size: 34px;
      font-weight: 900;
      text-shadow: 0 2px 0 #fff;
      opacity: 0;
      pointer-events: none;
    }
    .damage.show { animation: damageFloat .78s ease; }
    .director-strip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 46px;
      padding: 8px 10px;

    .director-strip span { color: var(--soft); font-weight: 900; }

      display: none;
      place-items: center;
      text-align: center;
      padding: 18px;
      z-index: 20;

      box-shadow: var(--deep-shadow);

      padding: 8px 10px;
      display: grid;

      align-items: center;
      gap: 10px;
    }

    .log-list {
      display: flex;
      flex-wrap: nowrap;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 2px;
    }
    .log-pill {
      flex: 0 0 auto;
      padding: 5px 8px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--line);
      color: var(--soft);
      font-weight: 900;
      font-size: 13px;
    }

    @keyframes skyDive { 0%{translate:0 0; rotate:0} 28%{translate:0 -132px; rotate:-10deg} 64%{translate:145px -54px; rotate:16deg} 100%{translate:0 0; rotate:0} }
    @keyframes bossStrike { 0%{scale:1; translate:0 0} 30%{scale:1.45; translate:0 -30px} 58%{scale:1.55; translate:128px -6px} 100%{scale:1; translate:0 0} }
    @keyframes ultimateHit { 0%{scale:1; translate:0 0} 32%{scale:1.16; translate:0 -24px} 52%{scale:1.22; translate:120px 0} 100%{scale:1; translate:0 0} }
    @keyframes hurtLeft { 0%{translate:0 0} 36%{translate:-30px 0; rotate:-5deg} 100%{translate:0 0} }
    @keyframes hurtRight { 0%{translate:0 0} 36%{translate:30px 0; rotate:5deg} 100%{translate:0 0} }
    @keyframes victory { 0%,100%{translate:0 0; rotate:0} 50%{translate:0 -10px; rotate:3deg} }
    @keyframes auraFlash { 0%{opacity:0; scale:.6} 45%{opacity:1; scale:1.5} 100%{opacity:0; scale:2.2} }
    @keyframes impact { 0%{opacity:0; scale:.2} 40%{opacity:1; scale:9} 100%{opacity:0; scale:13} }
    @keyframes beamShot { 0%{opacity:0; scaleX(.1)} 30%{opacity:1; scaleX(1)} 100%{opacity:0; scaleX(1.2)} }
    @keyframes ringBind { 0%{opacity:0; scale:2.2; translate:0 -20px} 45%{opacity:1; scale:1} 100%{opacity:0; scale:.78; translate:0 18px} }
    @keyframes orbitSpin { 0%{opacity:0; rotate:0deg; scale:.5} 20%{opacity:1} 100%{opacity:0; rotate:420deg; scale:1.3} }
    @keyframes arrowShot { 0%{opacity:0; scaleX(.1)} 20%{opacity:1; scaleX(1)} 100%{opacity:0; translate:54px 0; scaleX(1.12)} }
    @keyframes helperRush { 0%{opacity:0; translate:-80px 20px; scale:.7} 28%{opacity:1} 72%{opacity:1; translate:80px -12px; scale:1.15} 100%{opacity:0; translate:120px 8px; scale:.9} }
    @keyframes magnetPull { 0%{opacity:0; translate:0 20px; scale:.7} 35%{opacity:1; scale:1.15} 100%{opacity:0; translate:0 -54px; scale:.9} }
    @keyframes skyHelper { 0%{opacity:0; translate:-54px -100px; scale:.7} 32%{opacity:1} 72%{opacity:1; translate:90px -40px; scale:1.12} 100%{opacity:0; translate:130px -8px; scale:.9} }
    @keyframes arrowShotRight { 0%{opacity:0; scaleX(-.1)} 20%{opacity:1; scaleX(-1)} 100%{opacity:0; translate:-54px 0; scaleX(-1.12)} }
    @keyframes helperRushRight { 0%{opacity:0; translate:80px 20px; scale:.7} 28%{opacity:1} 72%{opacity:1; translate:-80px -12px; scale:1.15} 100%{opacity:0; translate:-120px 8px; scale:.9} }
    @keyframes magnetPullRight { 0%{opacity:0; translate:0 20px; scale:.7} 35%{opacity:1; scale:1.15} 100%{opacity:0; translate:0 -54px; scale:.9} }
    @keyframes skyHelperRight { 0%{opacity:0; translate:54px -100px; scale:.7} 32%{opacity:1} 72%{opacity:1; translate:-90px -40px; scale:1.12} 100%{opacity:0; translate:-130px -8px; scale:.9} }
    @keyframes rainbowPulse { 0%{opacity:0; scale:.55; rotate:0deg} 42%{opacity:.92; scale:1; rotate:60deg} 100%{opacity:.18; scale:1.12; rotate:140deg} }
    @keyframes bossFlash { 0%{opacity:0; scale:.5} 35%{opacity:1; scale:1.25} 100%{opacity:0; scale:1.7} }
    @keyframes damageFloat { 0%{opacity:0; translate:0 8px; scale:.8} 20%{opacity:1} 100%{opacity:0; translate:0 -62px; scale:1.14} }
    @keyframes bannerIn { from{opacity:0; transform:translateY(14px) scale(.96)} to{opacity:1; transform:translateY(0) scale(1)} }

    @media (max-width: 1080px) {
      .layout { grid-template-columns: 1fr; }
      .hand-panel { min-height: 0; }

    @keyframes weaponFloat {
      0%,100% { translate: 0 0; }
      50% { translate: 0 -7px; }

        left: { x: "50%", y: "6%", rotate: 0, origin: "50% 50%" },
        right: { x: "50%", y: "6%", rotate: 0, origin: "50% 50%" }
      },
      fantianyin: {
        type: "stamp",
        size: 104,
        z: 6,
        left: { x: "50%", y: "0%", rotate: -4, origin: "50% 50%" },
        right: { x: "50%", y: "0%", rotate: 4, origin: "50% 50%" }
      },
      jiulongshenhuozhao: {
        type: "cover",
        size: 118,
        z: 6,
        left: { x: "50%", y: "15%", rotate: -2, origin: "50% 50%" },
        right: { x: "50%", y: "15%", rotate: 2, origin: "50% 50%" }
      }
    };

    const defaultWeaponPoses = {
      staff: {
        type: "staff",
        size: 154,
        z: 4,
        left: { x: "79%", y: "50%", rotate: -18, origin: "24% 76%" },
        right: { x: "21%", y: "50%", rotate: 18, origin: "76% 76%" }
      },
      blade: {
        type: "blade",
        size: 132,
        z: 4,
        left: { x: "76%", y: "48%", rotate: -28, origin: "28% 78%" },
        right: { x: "24%", y: "48%", rotate: 28, origin: "72% 78%" }
      },
      heavy: {
        type: "heavy",
        size: 132,
        z: 4,
        left: { x: "72%", y: "40%", rotate: -36, origin: "34% 82%" },
        right: { x: "28%", y: "40%", rotate: 36, origin: "66% 82%" }
      },
      fan: {
        type: "fan",
        size: 118,
        z: 4,
        left: { x: "78%", y: "49%", rotate: -10, origin: "28% 74%" },
        right: { x: "22%", y: "49%", rotate: 10, origin: "72% 74%" }
      },
      whip: {
        type: "whip",
        size: 138,
        z: 4,
        left: { x: "77%", y: "47%", rotate: -22, origin: "24% 78%" },
        right: { x: "23%", y: "47%", rotate: 22, origin: "76% 78%" }
      },
      hand: {
        type: "hand",
        size: 136,
        z: 4,
        left: { x: "78%", y: "48%", rotate: -18, origin: "25% 75%" },
        right: { x: "22%", y: "48%", rotate: 18, origin: "75% 75%" }
      }
    };

    function weaponPoseForId(id) {
      if (specialWeaponPoses[id]) return specialWeaponPoses[id];
      const type = Object.keys(weaponPoseTypes).find((key) => weaponPoseTypes[key].has(id)) || "hand";
      return defaultWeaponPoses[type];
    }

    const weapons = (window.RUOGU_WEAPONS && window.RUOGU_WEAPONS.length ? window.RUOGU_WEAPONS : fallbackWeapons)
      .map((w, index) => ({
        id: w.id || `weapon-${index}`,
        name: w.name || "神兵",
        mark: w.mark || "兵",
        power: Number(w.power || 50),
        hero: w.hero || "若谷侠",
        source: w.source || "若谷神兵库",
        image: w.image ? "../" + w.image.replace(/^\.\//, "") : "",
        duelPose: w.duelPose || weaponPoseForId(w.id)
      }));

    const state = {
      left: { character: "hero", weapon: weapons[0].id, hp: 120, maxHp: 120, shield: 0, evade: "", disarmed: false, transformed: false, timers: {} },
      right: { character: "redking", weapon: weapons[Math.min(6, weapons.length - 1)].id, hp: 136, maxHp: 136, shield: 0, evade: "", disarmed: false, transformed: false, timers: {} },
      locked: false,
      round: 1,
      rainbowUsed: 0,
      transformUsed: 0,
      timeTimer: null,
      computerMode: false,
      aiTimer: null,
      lastHumanMove: ""
    };

    const $ = (id) => document.getElementById(id);

    function playSfx(name) {
      void name;
    }

    function charById(id) {
      return characters.find((c) => c.id === id) || characters[0];
    }

    function weaponById(id) {
      return weapons.find((w) => w.id === id) || weapons[0];
    }

    function image(path, alt) {
      return `<img src="${path}" alt="${alt}" onerror="this.replaceWith(Object.assign(document.createElement('strong'),{textContent:'${alt.slice(0, 1)}'}))">`;
    }

    function setupSelect(select, list, value) {
      select.innerHTML = list.map((item) => `<option value="${item.id}">${item.name}</option>`).join("");
      select.value = value;
    }

    function mount() {
      // Populate scene selector
      const sceneSelect = $("sceneSelect");
      sceneSelect.innerHTML = SCENES.map(s => `<option value="${s.id}">${s.name}</option>`).join("");
      sceneSelect.value = currentScene.id;
      $("sceneName").textContent = currentScene.name;
      sceneSelect.addEventListener("change", () => {
        currentScene = SCENES.find(s => s.id === sceneSelect.value) || SCENES[0];
        $("sceneName").textContent = currentScene.name;
        updateStageBackground();
      });

      setupSelect($("leftCharacter"), characters, state.left.character);
      setupSelect($("rightCharacter"), characters, state.right.character);
      setupSelect($("leftWeapon"), weapons, state.left.weapon);
      setupSelect($("rightWeapon"), weapons, state.right.weapon);

      $("leftCharacter").addEventListener("change", (e) => setCharacter("left", e.target.value));
      $("rightCharacter").addEventListener("change", (e) => setCharacter("right", e.target.value));
      $("leftWeapon").addEventListener("change", (e) => { state.left.weapon = e.target.value; render(); });
      $("rightWeapon").addEventListener("change", (e) => { state.right.weapon = e.target.value; render(); });
      $("resetBtn").addEventListener("click", resetFight);
      $("randomBtn").addEventListener("click", randomFight);
      $("swapBtn").addEventListener("click", swapSides);
      $("computerBtn").addEventListener("click", toggleComputerMode);
      document.querySelectorAll("[data-buy]").forEach((button) => {
        button.addEventListener("click", () => {
          if (!DUEL) return;
          const result = DUEL.purchase(button.dataset.buy);
          $("walletNote").textContent = result.message;
          renderWallet();
        });
      });
      renderMoves("left");
      renderMoves("right");
      renderWallet();
      resetFight(false);
      updateStageBackground();
    }

    function renderWallet() {
      if (!DUEL) return;
      const info = DUEL.summary();
      $("walletStars").textContent = info.ok ? `总星 ${info.totalStars}` : "未连接识字档案";
      $("walletTime").textContent = `对战 ${DUEL.formatTime(info.playSeconds)}`;
      $("walletRainbow").textContent = `彩虹罩 ${info.rainbowTickets} 次`;
      $("walletTransform").textContent = `变身 ${info.transformTickets} 次`;
      document.querySelectorAll("[data-buy]").forEach((button) => {
        const cost = info.costs[button.dataset.buy] || 0;
        button.disabled = info.ok && info.totalStars < cost;
      });
    }

    function hasLinkedProfile() {
      return Boolean(DUEL && DUEL.summary().ok);
    }

    function hasPlayTime() {
      return !hasLinkedProfile() || DUEL.summary().playSeconds > 0;
    }

    function startPlayTimer() {
      if (!hasLinkedProfile() || state.timeTimer) return;
      state.timeTimer = setInterval(() => {
        const spent = DUEL.consume("playSeconds", 1);
        renderWallet();
        if (!spent || DUEL.summary().playSeconds <= 0) {
          clearInterval(state.timeTimer);
          state.timeTimer = null;
          $("directorLine").textContent = "对战时间用完了，可以回识字 App 或在上面兑换。";
        }
      }, 1000);
    }

    function stopPlayTimer() {
      if (state.timeTimer) clearInterval(state.timeTimer);
      state.timeTimer = null;
    }

    function clearAiTimer() {
      if (state.aiTimer) clearTimeout(state.aiTimer);
      state.aiTimer = null;
    }

    function setCharacter(side, id) {
      state[side].character = id;
      const c = charById(id);
      state[side].maxHp = c.hp;
      state[side].hp = c.hp;
      hideWinner();
      render();
    }

    function updateStageBackground() {
      const bg = $("stageBg");
      const url = currentScene.bg;
      if (!bg || !url) return;
      bg.classList.remove("show");
      setTimeout(() => {
        bg.style.backgroundImage = `url(${url})`;
        bg.classList.add("show");
      }, 350);
    }

    function renderMoves(side) {
      const box = $(`${side}Moves`);
      box.innerHTML = moves.map((move) => `
        <button class="move-btn ${move.ultimate ? "ultimate" : ""} ${move.kind || ""}" data-side="${side}" data-move="${move.id}" ${side === "right" && state.computerMode ? "disabled" : ""}>
          <span>${move.icon}</span>
          <strong>${move.name}</strong>
          <small>${move.desc}</small>
        </button>
      `).join("");
      box.querySelectorAll("button").forEach((btn) => {
        btn.addEventListener("click", () => doMove(btn.dataset.side, btn.dataset.move));
      });
    }

    function render() {
      renderSide("left");
      renderSide("right");
      renderStage();
      renderHp();
    }

    function renderSide(side) {
      const data = state[side];
      const c = charById(data.character);
      const w = weaponById(data.weapon);
      $(`${side}Preview`).innerHTML = `
        ${image(CUTOUT + c.file, c.name)}
        <strong>${c.name}</strong>
      `;
      $(`${side}WeaponPreview`).innerHTML = `
        ${w.image ? `<img src="${w.image}" alt="${w.name}">` : `<strong>${w.mark}</strong>`}
        <div><strong>${w.name}</strong><small>${w.source} · ${w.hero} · 武力 ${w.power}</small></div>
      `;
    }

    function weaponImageForSide(weapon, side) {
      if (!weapon || !weapon.image) return "";
      // 左边小人用朝右版本 _r.png，右边小人用朝左版本 _l.png
      return side === "left"
        ? weapon.image
        : weapon.image.replace("_r.png", "_l.png");
    }

    function cssUnit(value) {
      return typeof value === "number" ? `${value}px` : value;
    }

    function applyWeaponPose(side, weapon) {
      const ghost = $(`${side}WeaponGhost`);
      const pose = weapon.duelPose || defaultWeaponPoses.hand;
      const sidePose = pose[side] || pose.left || defaultWeaponPoses.hand[side];
      const [originX = "50%", originY = "50%"] = String(sidePose.origin || "50% 50%").split(/\s+/);
      ghost.className = `weapon-ghost weapon-${pose.type || "hand"}`;
      ghost.style.setProperty("--weapon-size", cssUnit(sidePose.size || pose.size || 136));
      ghost.style.setProperty("--weapon-x", cssUnit(sidePose.x || "50%"));
      ghost.style.setProperty("--weapon-y", cssUnit(sidePose.y || "50%"));
      ghost.style.setProperty("--weapon-rotate", `${sidePose.rotate || 0}deg`);
      ghost.style.setProperty("--weapon-origin-x", originX);
      ghost.style.setProperty("--weapon-origin-y", originY);
      ghost.style.setProperty("--weapon-z", sidePose.z || pose.z || 4);
    }

    function renderStage() {
      const leftChar = charById(state.left.character);
      const rightChar = charById(state.right.character);
      const leftWeapon = weaponById(state.left.weapon);
      const rightWeapon = weaponById(state.right.weapon);
      $("leftSprite").src = CUTOUT + leftChar.file;
      $("rightSprite").src = CUTOUT + rightChar.file;
      $("leftWeaponGhost").src = weaponImageForSide(leftWeapon, "left");
      $("rightWeaponGhost").src = weaponImageForSide(rightWeapon, "right");
      applyWeaponPose("left", leftWeapon);
      applyWeaponPose("right", rightWeapon);
      $("leftWeaponGhost").style.display = leftWeapon.image && !state.left.disarmed ? "block" : "none";
      $("rightWeaponGhost").style.display = rightWeapon.image && !state.right.disarmed ? "block" : "none";
      $("leftName").textContent = leftChar.name;
      $("rightName").textContent = rightChar.name;
      renderFighterStatus("left");
      renderFighterStatus("right");
    }

    function renderFighterStatus(side) {
      const fighter = $(`${side}Fighter`);
      fighter.classList.toggle("disarmed", state[side].disarmed);
      fighter.classList.toggle("shielded", state[side].shield === "rainbow");
      fighter.classList.toggle("evading", Boolean(state[side].evade));
      fighter.classList.toggle("boss-mode", state[side].transformed);
    }

    function renderHp() {
      ["left", "right"].forEach((side) => {
        const data = state[side];
        const pct = Math.max(0, Math.round((data.hp / data.maxHp) * 100));
        $(`${side}Hp`).style.width = pct + "%";
        $(`${side}HpText`).textContent = `${Math.max(0, data.hp)}/${data.maxHp}`;
      });
    }

    function toggleComputerMode() {
      state.computerMode = !state.computerMode;
      clearAiTimer();
      updateComputerButton();
      renderMoves("right");
      $("directorLine").textContent = state.computerMode
        ? "电脑控制右手。它会自己找机会出招，你用左手应战。"
        : "双手导演模式：左手右手都可以自己点。";
      log(state.computerMode ? "电脑对战开启，右手交给电脑。" : "电脑对战关闭，回到双手导演。");
      if (state.computerMode) scheduleComputerMove();
    }

    function updateComputerButton() {
      const button = $("computerBtn");
      button.textContent = state.computerMode ? "电脑对战：开" : "电脑对战：关";
      button.classList.toggle("active", state.computerMode);
      button.setAttribute("aria-pressed", String(state.computerMode));
    }

    function moveById(id) {
      return moves.find((m) => m.id === id) || moves[0];
    }

    function canComputerUse(move) {
      return !move.shield && !move.transform;
    }

    function weightedPick(list) {
      const total = list.reduce((sum, item) => sum + item.weight, 0);
      let roll = Math.random() * total;
      for (const item of list) {
        roll -= item.weight;
        if (roll <= 0) return item.id;
      }
      return list[list.length - 1].id;
    }

    function chooseComputerMove() {
      const ai = state.right;
      const player = state.left;
      const hpRate = ai.hp / ai.maxHp;
      const playerHpRate = player.hp / player.maxHp;
      const last = moveById(state.lastHumanMove || "arrow");
      const attacks = moves.filter((move) => move.damage > 0 && canComputerUse(move));
      const finish = attacks
        .filter((move) => move.damage >= player.hp)
        .sort((a, b) => a.damage - b.damage)[0];
      if (finish && Math.random() < 0.72) return finish.id;

      if (hpRate < 0.38 && !ai.evade && Math.random() < 0.42) {
        return last.attackType === "high" ? "crouch" : "jump";
      }

      if (player.shield === "rainbow" && Math.random() < 0.55) return "magnet";
      if (!player.disarmed && Math.random() < 0.12) return "magnet";
      if (player.evade === "ground" && Math.random() < 0.7) return weightedPick([
        { id: "arrow", weight: 3 },
        { id: "gold-pants", weight: 4 },
        { id: "flyer", weight: 5 }
      ]);
      if (player.evade === "high" && Math.random() < 0.7) return weightedPick([
        { id: "snake", weight: 3 },
        { id: "leopard", weight: 4 },
        { id: "beetle", weight: 4 },
        { id: "combo-kick", weight: 3 }
      ]);

      if (playerHpRate < 0.42 && Math.random() < 0.35) {
        return weightedPick([
          { id: "combo-kick", weight: 4 },
          { id: "flyer", weight: 3 },
          { id: "beetle", weight: 3 },
          { id: "leopard", weight: 2 }
        ]);
      }

      return weightedPick([
        { id: "arrow", weight: 4 },
        { id: "snake", weight: 4 },
        { id: "leopard", weight: 5 },
        { id: "beetle", weight: 5 },
        { id: "combo-kick", weight: 3 },
        { id: "gold-pants", weight: 2 },
        { id: "flyer", weight: 2 },
        { id: "jump", weight: hpRate < 0.55 ? 2 : 1 },
        { id: "crouch", weight: hpRate < 0.55 ? 2 : 1 }
      ]);
    }

    function scheduleComputerMove() {
      clearAiTimer();
      if (!state.computerMode || state.left.hp <= 0 || state.right.hp <= 0) return;
      const delay = 450 + Math.floor(Math.random() * 450);
      state.aiTimer = setTimeout(() => {
        if (!state.computerMode || state.left.hp <= 0 || state.right.hp <= 0) return;
        if (state.locked) {
          scheduleComputerMove();
          return;
        }
        doMove("right", chooseComputerMove());
      }, delay);
    }

    function doMove(side, moveId) {
      if (state.locked || state.left.hp <= 0 || state.right.hp <= 0) return;
      if (!hasPlayTime()) {
        $("directorLine").textContent = "对战时间不够：50 星可以换 5 分钟。";
        $("walletNote").textContent = "先兑换对战时间，再让小人继续打。";
        return;
      }
      const attacker = state[side];
      const targetSide = side === "left" ? "right" : "left";
      const target = state[targetSide];
      const move = moves.find((m) => m.id === moveId) || moves[0];
      const char = charById(attacker.character);
      let damage = move.damage;
      let mode = move.shield ? "shield" : move.evade ? "evade" : "hit";
      let blockedText = "";

      if (move.shield && hasLinkedProfile()) {
        if (state.rainbowUsed >= DUEL.LIMITS.rainbowPerBattle) {
          $("directorLine").textContent = "这一局彩虹防护罩已经用满 3 次了。";
          return;
        }
        if (!DUEL.consume("rainbow")) {
          $("directorLine").textContent = "彩虹防护罩次数不够：20 星换 1 次。";
          renderWallet();
          return;
        }
        state.rainbowUsed += 1;
        renderWallet();
      }

      if (move.transform && hasLinkedProfile()) {
        if (state.transformUsed >= DUEL.LIMITS.transformPerBattle) {
          $("directorLine").textContent = "这一局变身已经用满 2 次了。";
          return;
        }
        if (!DUEL.consume("transform")) {
          $("directorLine").textContent = "变身次数不够：30 星换 1 次。";
          renderWallet();
          return;
        }
        state.transformUsed += 1;
        renderWallet();
      }

      state.locked = true;
      clearAiTimer();
      if (side === "left") state.lastHumanMove = move.id;
      startPlayTimer();
      playSfx(move.id);
      const actor = $(`${side}Fighter`);
      const victim = $(`${targetSide}Fighter`);
      actor.classList.remove("idle");
      actor.classList.add("attacking", move.cls);
      showMoveFx(side, targetSide, move);

      setTimeout(() => {
        if (move.evade) {
          attacker.evade = move.evade;
          showImpact(side, 0, move, "evade");
          log(`${sideName(side)}的${char.name}用「${move.name}」，准备躲下一次${move.evade === "ground" ? "地面" : "高处"}攻击！`);
        } else if (move.shield) {
          attacker.shield = move.shield;
          showImpact(side, 0, move, "guard");
          log(`${sideName(side)}的${char.name}打开「彩虹防护罩」，下一次攻击会被挡住！`);
        } else {
          if (target.shield === "rainbow" && damage > 0) {
            blockedText = `${sideName(targetSide)}的彩虹防护罩挡住了这一下！`;
            damage = 0;
            target.shield = 0;
            mode = "guard";
          } else if (target.evade && target.evade === move.attackType && damage > 0) {
            blockedText = `${sideName(targetSide)}${target.evade === "ground" ? "跳起来" : "蹲下去"}躲开了！`;
            damage = 0;
            target.evade = "";
            mode = "evade";
          } else if (target.evade && damage > 0) {
            target.evade = "";
          }

          target.hp = Math.max(0, target.hp - damage);
          if (move.disarm) disarm(targetSide);
          if (move.transform) transformBoss(side);
          if (damage) victim.classList.add(targetSide === "left" ? "hurt-left" : "hurt-right");
          showImpact(targetSide, damage, move, mode);
          const extra = move.disarm ? "，还把对方武器吸走10秒" : move.transform ? "，变成大BOSS10秒" : "";
          log(blockedText || `${sideName(side)}的${char.name}用「${move.name}」${damage ? `打出 ${damage} 点` : ""}${extra}！`);
        }
        renderStage();
        renderHp();
      }, move.ultimate ? 520 : 320);

      setTimeout(() => {
        actor.classList.remove("attacking", ...moves.map((item) => item.cls));
        victim.classList.remove("hurt-left", "hurt-right");
        actor.classList.add("idle");
        if (target.hp <= 0) {
          win(side);
        } else {
          state.locked = false;
          state.round += 1;
          $("directorLine").textContent = state.computerMode
            ? (side === "left" ? "电脑正在看招，马上反击。" : "电脑还在盯着你，左手快应战。")
            : "继续演！左手右手都可以马上出招。";
          if (state.computerMode) scheduleComputerMove();
        }
      }, move.ultimate ? 1040 : 820);
    }

    function sideName(side) {
      return side === "left" ? "左手" : "右手";
    }

    function clearSideTimers(side) {
      Object.values(state[side].timers || {}).forEach((timer) => clearTimeout(timer));
      state[side].timers = {};
    }

    function disarm(side) {
      state[side].disarmed = true;
      clearTimeout(state[side].timers.disarm);
      state[side].timers.disarm = setTimeout(() => {
        state[side].disarmed = false;
        renderStage();
        log(`${sideName(side)}的武器飞回来了。`);
      }, 10000);
    }

    function transformBoss(side) {
      state[side].transformed = true;
      clearTimeout(state[side].timers.transform);
      state[side].timers.transform = setTimeout(() => {
        state[side].transformed = false;
        renderStage();
        log(`${sideName(side)}的大BOSS变身结束了。`);
      }, 10000);
    }

    function showMoveFx(side, targetSide, move) {
      const layer = $("stage");
      if (!move.fx) return;
      const targetLeft = targetSide === "left" ? "28%" : "72%";
      const fx = document.createElement("span");
      fx.className = `fx fx-${move.fx}`;
      if (side === "right") fx.classList.add("fx-from-right");
      if (move.fx === "beam" || move.fx === "arrow") {
        fx.style.left = side === "left" ? "30%" : "36%";
      } else if (move.fx === "ring") {
        fx.style.left = targetLeft;
      } else if (move.fx === "orbit") {
        fx.style.left = side === "left" ? "17%" : "70%";
        fx.style.top = "39%";
      } else if (move.fx === "rainbow") {
        fx.style.left = side === "left" ? "18%" : "68%";
        fx.style.top = "35%";
      } else {
        fx.style.left = side === "left" ? "34%" : "58%";
      }
      layer.appendChild(fx);
      requestAnimationFrame(() => fx.classList.add("show"));
      setTimeout(() => { if (fx.parentNode) fx.remove(); }, 1050);
    }

    function showImpact(targetSide, damage, move, mode = "hit") {
      const impact = $("impact");
      const dmg = $("damageText");
      impact.classList.remove("show");
      dmg.classList.remove("show");
      const left = targetSide === "left" ? "28%" : "72%";
      impact.style.left = left;
      dmg.style.left = left;
      dmg.style.top = move.ultimate ? "34%" : "42%";
      dmg.textContent = mode === "guard" ? "挡住" : mode === "evade" ? "躲开" : "-" + damage;
      dmg.style.color = mode === "guard" || mode === "evade" ? "var(--blue)" : "var(--red)";
      void impact.offsetWidth;
      impact.classList.add("show");
      dmg.classList.add("show");
    }

    function win(side) {
      state.locked = true;
      clearAiTimer();
      stopPlayTimer();
      const winner = charById(state[side].character);
      const loserSide = side === "left" ? "right" : "left";
      $(`${side}Fighter`).classList.add("win");
      $(`${loserSide}Fighter`).style.opacity = ".42";
      $("winnerBanner").innerHTML = `<div><p class="eyebrow">VICTORY</p><h2>${side === "left" ? "左手" : "右手"} ${winner.name} 获胜！</h2></div>`;
      $("winnerBanner").classList.add("show");
      $("directorLine").textContent = "这一场演完了，可以重新开始或换人对战。";
      log(`${winner.name} 获胜，导演可以换人再打一场。`);
    }

    function hideWinner() {
      $("winnerBanner").classList.remove("show");
      ["left", "right"].forEach((side) => {
        $(`${side}Fighter`).classList.remove("win");
        $(`${side}Fighter`).style.opacity = "1";
      });
    }

    function resetFight(announce = true) {
      clearAiTimer();
      stopPlayTimer();
      ["left", "right"].forEach((side) => {
        clearSideTimers(side);
        const c = charById(state[side].character);
        state[side].maxHp = c.hp;
        state[side].hp = c.hp;
        state[side].shield = 0;
        state[side].evade = "";
        state[side].disarmed = false;
        state[side].transformed = false;
      });
      state.locked = false;
      state.round = 1;
      state.rainbowUsed = 0;
      state.transformUsed = 0;
      hideWinner();
      render();
      renderWallet();
      updateComputerButton();
      if (announce) log("重新开始，小人站好了。");
      $("directorLine").textContent = state.computerMode
        ? "电脑对战已准备好。右手电脑会自己出招。"
        : "左手先出招，右手也可以连着演。";
      if (state.computerMode) scheduleComputerMove();
    }

    function randomFight() {
      state.left.character = characters[Math.floor(Math.random() * characters.length)].id;
      state.right.character = characters[Math.floor(Math.random() * characters.length)].id;
      state.left.weapon = weapons[Math.floor(Math.random() * weapons.length)].id;
      state.right.weapon = weapons[Math.floor(Math.random() * weapons.length)].id;
      $("leftCharacter").value = state.left.character;
      $("rightCharacter").value = state.right.character;
      $("leftWeapon").value = state.left.weapon;
      $("rightWeapon").value = state.right.weapon;
      resetFight(false);
      log("随机换好人和神兵，开打。");
      updateStageBackground();
    }

    function swapSides() {
      clearSideTimers("left");
      clearSideTimers("right");
      const left = { ...state.left, timers: {} };
      state.left = { ...state.right, timers: {} };
      state.right = left;
      $("leftCharacter").value = state.left.character;
      $("rightCharacter").value = state.right.character;
      $("leftWeapon").value = state.left.weapon;
      $("rightWeapon").value = state.right.weapon;
      resetFight(false);
      log("左右换人，对调舞台。");
      updateStageBackground();
    }

    function log(text) {
      const box = $("battleLog");
      const pill = document.createElement("span");
      pill.className = "log-pill";
      pill.textContent = text;
      box.prepend(pill);
      while (box.children.length > 12) box.lastChild.remove();
    }

    mount();
  </script>
</body>
</html>
