<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#0a1020" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="星河书旅" />
    <title>若谷星河书旅</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/icon-180.png" />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        height: 100%;
        font-family: "KaiTi", "STKaiti", "华文楷体", "楷体", "Noto Serif CJK SC", serif;
        color: #f7f6f2;
        overflow: hidden;
      }
      .page-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        background-color: #0a1020;
        background-image: url("./assets/backgrounds/07_reading_galaxy_map_mobile.jpg");
        background-position: center;
        background-size: cover;
        background-repeat: no-repeat;
      }
      .page-bg::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse at 50% 0%, rgba(10,16,32,0.55) 0%, transparent 45%),
          radial-gradient(ellipse at 50% 100%, rgba(10,16,32,0.25) 0%, transparent 40%);
        pointer-events: none;
      }
      .map-shell {
        position: relative;
        z-index: 1;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 8vh 4vw 0;
      }
      .map-title {
        text-align: center;
        text-shadow: 0 2px 18px rgba(0,0,0,0.55);
      }
      .map-title h1 {
        font-size: clamp(44px, 9vw, 88px);
        letter-spacing: 8px;
        background: linear-gradient(180deg, #fff8e7 0%, #e8d5a8 55%, #c9a86c 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .map-title p {
        font-size: clamp(20px, 3.2vw, 30px);
        margin-top: 12px;
        color: #e8d5a8;
        letter-spacing: 5px;
      }

      /* 拾字谷漂浮入口 */
      .realm-gate {
        position: absolute;
        bottom: 7%;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        cursor: pointer;
        text-decoration: none;
        color: inherit;
        animation: float 3.2s ease-in-out infinite;
      }
      .realm-gate .halo {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 160%;
        height: 180%;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255,220,150,0.24) 0%, rgba(255,200,90,0.09) 45%, transparent 72%);
        animation: pulse 2.6s ease-in-out infinite;
        pointer-events: none;
        z-index: -1;
      }
      .realm-gate .name {
        font-size: clamp(26px, 4.5vw, 46px);
        letter-spacing: 6px;
        color: #fff8e7;
        text-shadow:
          0 0 8px rgba(255, 220, 150, 0.95),
          0 0 24px rgba(255, 200, 90, 0.65),
          0 0 46px rgba(255, 170, 60, 0.4),
          0 2px 12px rgba(0,0,0,0.55);
      }
      .realm-gate .hint {
        margin-top: 8px;
        font-size: clamp(11px, 1.6vw, 14px);
        color: rgba(240, 228, 198, 0.75);
        letter-spacing: 2px;
        opacity: 0;
        transform: translateY(-4px);
        transition: all 0.35s ease;
        text-shadow: 0 1px 6px rgba(0,0,0,0.5);
      }
      .realm-gate:hover .hint,
      .realm-gate:active .hint {
        opacity: 1;
        transform: translateY(0);
      }

      /* 未开启星域占位 */
      .locked-star {
        position: absolute;
        font-size: clamp(13px, 1.9vw, 18px);
        color: rgba(240, 228, 198, 0.42);
        letter-spacing: 2px;
        text-shadow: 0 1px 6px rgba(0,0,0,0.5);
        pointer-events: none;
      }
      .locked-star.s1 { bottom: 38%; left: 56%; }
      .locked-star.s2 { bottom: 52%; left: 44%; }
      .locked-star.s3 { bottom: 66%; left: 60%; }

      @keyframes float {
        0%, 100% { transform: translate(-50%, 0); }
        50% { transform: translate(-50%, -10px); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.55; transform: translate(-50%, -50%) scale(1); }
        50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
      }
    </style>
  </head>
  <body>
    <div class="page-bg"></div>
    <main class="map-shell">
      <header class="map-title">
        <h1>若谷星河书旅</h1>
        <p>旷兮其若谷</p>
      </header>

      <a class="realm-gate" href="./home.html" aria-label="进入拾字谷">
        <span class="halo"></span>
        <div class="name">拾字谷</div>
        <div class="hint">点击进入</div>
      </a>

      <span class="locked-star s1">星域 · 待开启</span>
      <span class="locked-star s2">星域 · 待开启</span>
      <span class="locked-star s3">星域 · 待开启</span>
    </main>
  </body>
</html>
