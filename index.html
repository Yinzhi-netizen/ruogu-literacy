<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#2c4a7c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="自主阅读" />
    <title>若谷自主阅读计划</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/icon-180.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="landing-shell">
      <div class="landing-hero">
        <span class="landing-number">2026</span>
        <h1 class="landing-title">若谷自主阅读计划</h1>
        <p class="landing-sub">一年级识字闯关 · 神兵铸造之旅</p>
      </div>

      <section class="module-grid">
        <div class="module-card" data-mode="recognize">
          <div class="module-icon">&#x1F4D6;</div>
          <h3>认读关</h3>
          <p>看字选拼音，每答对一题 +1 星</p>
          <span class="module-stars">+1 星</span>
        </div>
        <div class="module-card" data-mode="dictation">
          <div class="module-icon">&#x270D;</div>
          <h3>听写关</h3>
          <p>听语音提示，在屏幕上手写汉字</p>
          <span class="module-stars">+3 星</span>
        </div>
        <div class="module-card" data-mode="reading">
          <div class="module-icon">&#x1F4DC;</div>
          <h3>阅读关</h3>
          <p>自己读完一篇文章或一首古诗</p>
          <span class="module-stars">+5 星</span>
        </div>
        <div class="module-card" data-mode="armory">
          <div class="module-icon">&#x2694;</div>
          <h3>神兵库</h3>
          <p>每 10 星铸造一个碎片，集满解锁神兵</p>
          <span class="module-stars">10 星 / 碎片</span>
        </div>
      </section>

      <div class="landing-cta">
        <a class="landing-button" href="./game.html">开始闯关</a>
      </div>
    </main>
  </body>
</html>
