<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#4a5538" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="星河书旅" />
    <title>若谷星河书旅</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/icon-180.png" />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      :root {
        --primary: #7a8b5e;
        --primary-deep: #4a5538;
        --accent: #b8453a;
      }
      .page-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }
      .page-bg::before {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(26, 22, 20, .28);
      }
      .topbar h1 { color: #f4f2ed; }
      .topbar .back-home { color: #c9a84c; }
      .stats span { color: #f4f2ed; }
      .stats small { color: #b5aea0; }
      .stats div { background: rgba(255,255,255,.10); border-color: rgba(212,208,197,.22); }
      .stats div::before { color: #c9a84c; }
      .profile-tool-button { color: #b5aea0; background: rgba(255,255,255,.10); border-color: rgba(212,208,197,.22); }
    </style>
  </head>
  <body>
    <div class="page-bg" style="background-image: url('./assets/backgrounds/05_scholar_mountain.png');"></div>
    <main class="app-shell">
      <section class="topbar" aria-label="闯关进度">
        <div>
          <a class="back-home" href="./index.html">← 首页</a>
          <h1>若谷星河书旅</h1>
        </div>
        <div class="stats">
          <div>
            <span id="stars">0</span>
            <small>总星</small>
          </div>
        </div>
        <button class="profile-tool-button" data-action="profileTools">档案</button>
      </section>

      <nav class="scope-bar" id="scopeBar" aria-label="出题范围">
        <button class="scope-tab active" data-scope="全部">全部</button>
        <button class="scope-tab" data-scope="上册">上册</button>
        <button class="scope-tab" data-scope="下册">下册</button>
      </nav>

      <nav class="mode-tabs" aria-label="关卡类型">
        <button class="tab active" data-mode="recognize">认读关</button>
        <button class="tab" data-mode="dictation">听写关</button>
        <button class="tab" data-mode="reading">阅读关</button>
      </nav>

      <div class="stage-row">
        <section class="stage" id="stage" aria-live="polite"></section>
        <aside class="duel-exchange" id="duelExchange" aria-label="小人对战兑换"></aside>
      </div>

      <section class="literacy-strip" id="literacyStrip"></section>

    </main>

    <!-- 数据源 -->
    <script src="./grade1-words.js"></script>
    <script src="./pinyin-data.js"></script>
    <script src="./reading-texts.js"></script>
    <script src="./words.js"></script>
    <script src="./weapons.js"></script>
    <!-- 功能模块（按依赖顺序）-->
    <script src="./state-store.js"></script>
    <script src="./word-data.js"></script>
    <script src="./progress.js"></script>
    <script src="./ocr-handwriting.js"></script>
    <script src="./weapon-system.js"></script>
    <script src="./ui-common.js"></script>
    <script src="./duel-link.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
