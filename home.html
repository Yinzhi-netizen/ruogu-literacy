<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#2c4a7c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="星河书旅" />
    <title>若谷星河书旅</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/icon-180.png" />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      :root {
        --primary: #7a8b5e;
        --primary-deep: #4a5538;
        --accent: #b8453a;
      }
      .page-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }
      .page-bg::before {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(244, 242, 237, .62);
      }
    </style>
  </head>
  <body>
    <div class="page-bg" style="background-image: url('./assets/backgrounds/06_cloud_characters_mobile.jpg');"></div>
    <main class="landing-shell">
      <div class="landing-hero">
        <span class="landing-number">2026</span>
        <h1 class="landing-title">若谷星河书旅</h1>
        <p class="landing-tagline">旷兮其若谷</p>
        <p class="landing-sub">一年级识字闯关 · 小人对战能量站</p>
      </div>

      <section class="module-grid">
        <div class="module-card" data-mode="recognize">
          <div class="module-icon"><img src="./assets/icons/icon_read.png" alt=""></div>
          <div class="module-card-body">
            <h3>认读关</h3>
            <p>看字选拼音，答对后自动进入下一题</p>
            <span class="module-stars">+2 星</span>
          </div>
        </div>
        <div class="module-card" data-mode="dictation">
          <div class="module-icon"><img src="./assets/icons/icon_write.png" alt=""></div>
          <div class="module-card-body">
            <h3>听写关</h3>
            <p>听语音提示，在屏幕上手写汉字</p>
            <span class="module-stars">+10 星</span>
          </div>
        </div>
        <div class="module-card" data-mode="reading">
          <div class="module-icon"><img src="./assets/icons/icon_scroll.png" alt=""></div>
          <div class="module-card-body">
            <h3>阅读关</h3>
            <p>自己读完一篇文章或一首古诗</p>
            <span class="module-stars">+5 星</span>
          </div>
        </div>
        <div class="module-card" onclick="location.href='./若谷冒险游戏/index.html'">
          <div class="module-icon"><img src="./assets/icons/icon_duel.png" alt=""></div>
          <div class="module-card-body">
            <h3>小人对战兑换</h3>
            <p>总星可以换 5 分钟对战、彩虹防护罩和变身次数</p>
            <span class="module-stars">50 / 20 / 30 星</span>
          </div>
        </div>
      </section>

      <div class="landing-cta">
        <a class="landing-button" href="./game.html">开始闯关</a>
      </div>
    </main>
  </body>
</html>
